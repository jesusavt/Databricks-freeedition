name: Despliegue a Databricks (Proyecto 2)

on:
  push:
    branches:
      - main # Se dispara cuando haces push a la rama principal

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Bajar el código del repo de GitHub
      - name: Checkout del código
        uses: actions/checkout@v3

      # 2. Instalar Databricks CLI
      - name: Instalar Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      # 3. Configurar credenciales
      - name: Configurar Databricks CLI
        run: |
          databricks configure --token <<EOF
          ${{ secrets.DATABRICKS_HOST }}
          ${{ secrets.DATABRICKS_TOKEN }}
          EOF

      # 4. Sincronizar archivos a la nueva carpeta (Proyecto2)
      - name: Sincronizar carpeta Proyecto2
        run: |
          # Importante: Esto sube todo tu repo local a la ruta especificada
          databricks workspace import-dir . /Workspace/Users/apps.compartidos@gmail.com/Proyecto2/ -o